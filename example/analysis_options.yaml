analyzer:
  plugins:
    - custom_lint

custom_lint:
  rules:
    - layer_boundaries
    - no_cross_feature_import
    - no_banned_imports
    - only_import_from_index

dart_boundaries:
  # ── layer_boundaries ──────────────────────────────────────────────────────
  # {{ name }} captures the feature folder name, enabling cross-feature detection.
  # default: disallow — block all cross-type imports unless explicitly allowed.
  layer_boundaries:
    default: disallow
    elements:
      - type: feature
        pattern: 'lib/features/{{ name }}'  # captures: auth, home, profile …
      - type: shared
        pattern: 'lib/shared/**'
      - type: core
        pattern: 'lib/core/**'
    rules:
      - from: feature
        allow: [shared, core]    # feature may only import shared and core
      - from: shared
        allow: [core]            # shared may only import core
      # core has no rule → default: disallow blocks all cross-type imports

  # ── no_cross_feature_import ───────────────────────────────────────────────
  no_cross_feature_import:
    features_path: lib/features

  # ── no_banned_imports ─────────────────────────────────────────────────────
  no_banned_imports:
    entries:
      # Global deny — no paths means this applies to ALL files
      - deny: ['lib/core/internal/**']
        message: 'Do not import from internal core APIs directly.'

      # Scoped deny with an exemption
      - paths: ['lib/features/**']
        exclude_paths: ['lib/features/auth/**']  # auth folder is exempt
        deny: ['lib/features/home/**']
        message: 'home → auth is banned. Use dependency injection instead.'

  # ── only_import_from_index ────────────────────────────────────────────────
  only_import_from_index:
    features_path: lib/features
